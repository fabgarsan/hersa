[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"config/settings/*.py" = ["F403", "F405"]

[tool.mypy]
python_version = "3.14"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["factory", "factory.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = "apps.*.factories"
disallow_untyped_calls = false

[tool.django-stubs]
django_settings_module = "config.settings.development"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.development"
python_files = ["tests.py", "test_*.py"]
addopts = "--cov=apps --cov-report=term-missing --cov-report=html:htmlcov"

[tool.mutmut]
paths_to_mutate = "apps/"
backup = false
runner = "pipenv run pytest -x --timeout=60 -q --no-cov"
tests_dir = "tests/ apps/"
dict_synonyms = ""
