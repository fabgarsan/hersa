client_max_body_size 20M;

# Security headers (M-4)
# CSP covers Django Admin + API. The React SPA (S3/CloudFront) needs its own
# Response Headers Policy configured at the CloudFront distribution level.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self' https://*.amazonaws.com; style-src 'self' 'unsafe-inline' https://*.amazonaws.com; script-src 'self' 'unsafe-inline' https://*.amazonaws.com; img-src 'self' data: https://*.amazonaws.com; font-src 'self' https://*.amazonaws.com; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
