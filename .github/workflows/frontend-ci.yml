name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      run_mutation:
        description: "Run full mutation tests"
        type: boolean
        default: false

defaults:
  run:
    working-directory: frontend

jobs:
  # ─── Gate: lint + typecheck + tests (blocks every PR) ───────────────────────
  quality:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

  # ─── Mutation tests: auth modules on every PR (fast, ~3 min) ────────────────
  mutation-pr:
    name: Mutation · Auth modules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Mutation tests (auth modules)
        run: |
          npx stryker run \
            --mutate "src/api/client.ts" \
            --mutate "src/shared/contexts/AuthProvider.tsx"
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report-pr
          path: frontend/reports/mutation/
          retention-days: 7

  # ─── Mutation tests: full scan on merge to main (informational) ──────────────
  mutation-full:
    name: Mutation · Full scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_mutation)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Mutation tests (full codebase)
        run: npx stryker run
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report-full
          path: frontend/reports/mutation/
          retention-days: 30
